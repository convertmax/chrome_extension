<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Convertmax Event Monitor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #18222d;
      --muted: #647587;
      --border: #d8e1ea;
      --accent: #0f5fa8;
      --success: #13795b;
      --warning: #9a6700;
      --danger: #b42318;
      --page: #edf6ff;
      --cart: #eefbf3;
      --search: #fff8e8;
      --convert: #fff0f0;
      --custom: #f6efff;
      --default-event: #eef2f7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 560px;
      height: 580px;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      width: 560px;
      height: 580px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 16px;
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
    }

    .subtle {
      margin-top: 4px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      min-width: 38px;
    }

    button:hover {
      border-color: var(--accent);
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .status-card,
    .info-panel,
    .empty,
    .request {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .status-card {
      padding: 10px;
    }

    .status-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .status-value {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 700;
    }

    .status-good {
      color: var(--success);
    }

    .status-warn {
      color: var(--warning);
    }

    .status-bad {
      color: var(--danger);
    }

    .info-panel,
    .empty,
    .request {
      padding: 12px;
    }

    .info-panel {
      margin-bottom: 12px;
    }

    .info-row {
      margin-top: 8px;
    }

    .info-key {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .info-value {
      margin-top: 4px;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }

    .events-wrap {
      flex: 1;
      min-height: 0;
      height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
    }

    .request {
      margin-bottom: 10px;
      border-left-width: 6px;
    }

    .request.event-page_view,
    .request.event-page {
      background: var(--page);
      border-left-color: #4b9fff;
    }

    .request.event-add_cart,
    .request.event-cart {
      background: var(--cart);
      border-left-color: #28a745;
    }

    .request.event-search {
      background: var(--search);
      border-left-color: #c58a00;
    }

    .request.event-convert {
      background: var(--convert);
      border-left-color: #d64545;
    }

    .request.event-custom,
    .request.event-quote,
    .request.event-coupon,
    .request.event-support_request {
      background: var(--custom);
      border-left-color: #7b61d1;
    }

    .request.event-default {
      background: var(--default-event);
      border-left-color: #708090;
    }

    .request-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(15, 95, 168, 0.08);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .pill.event-type {
      background: rgba(15, 95, 168, 0.16);
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
    }

    .meta-row {
      display: flex;
      gap: 6px;
      align-items: baseline;
      min-width: 0;
    }

    .meta-label {
      flex: 0 0 auto;
    }

    .meta-value {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .url {
      font-weight: 600;
      margin-bottom: 6px;
      word-break: break-word;
    }

    pre {
      margin: 8px 0 0;
      padding: 10px;
      background: rgba(15, 23, 42, 0.05);
      border-radius: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      overflow: visible;
      max-height: none;
    }

    .hidden {
      display: none;
    }

    .empty {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Convertmax Debugger</h1>
        <div class="subtle">Track Convertmax readiness and event flow across site pages until you clear the session.</div>
      </div>
      <div class="actions">
        <button id="toggleInfo" title="Show config details">i</button>
        <button id="clear" title="Clear debugger data">Clear</button>
      </div>
    </header>

    <section class="status-grid">
      <div class="status-card">
        <div class="status-label">Script Tag</div>
        <div class="status-value" id="scriptDetected">Waiting</div>
      </div>
      <div class="status-card">
        <div class="status-label">Loaded Event</div>
        <div class="status-value" id="scriptLoaded">Waiting</div>
      </div>
      <div class="status-card">
        <div class="status-label">Ready Event</div>
        <div class="status-value" id="readySeen">Waiting</div>
      </div>
      <div class="status-card">
        <div class="status-label">Client Activity</div>
        <div class="status-value" id="convertmaxPresent">Not seen yet</div>
      </div>
    </section>

    <section class="info-panel hidden" id="infoPanel">
      <div class="info-row">
        <div class="info-key">API Key</div>
        <div class="info-value" id="apiKeyValue">Not detected</div>
      </div>
      <div class="info-row">
        <div class="info-key">Event URL</div>
        <div class="info-value" id="eventUrlValue">Not detected</div>
      </div>
    </section>

    <div class="events-wrap">
      <div id="requests"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
